server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/alokdb
    driver-class-name: org.postgresql.Driver
    username: alok
    password: alokpass
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

security:
  jwt:
    secret: change-this-secret-for-production
    expirationMs: 86400000
